<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
  <title>Predictive Financial Analytics Swimlane Dark Theme</title>
  <defs>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9AA090" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4A7A3A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5050A0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="820" fill="#4A4E46"/>

  <!-- Swimlane fills -->
  <!-- Data layer: leftmost, slightly lighter -->
  <rect x="0"   y="0" width="240" height="820" fill="#52564E"/>
  <!-- Business Logic: middle -->
  <rect x="240" y="0" width="240" height="820" fill="#4E524A"/>
  <!-- Presentation: right -->
  <rect x="480" y="0" width="200" height="820" fill="#4A4E46"/>

  <!-- Dividers -->
  <line x1="240" y1="0"  x2="240" y2="820" stroke="#3A3E36" stroke-width="1.5"/>
  <line x1="480" y1="0"  x2="480" y2="820" stroke="#3A3E36" stroke-width="1.5"/>
  <line x1="0"   y1="68" x2="680" y2="68"  stroke="#3A3E36" stroke-width="1"/>

  <!-- Headers -->
  <text font-family="Georgia, serif" font-size="17" font-weight="bold"
        x="120" y="34" text-anchor="middle" fill="#D8DDD0">Data</text>
  <text font-family="Georgia, serif" font-size="13"
        x="120" y="54" text-anchor="middle" fill="#9AA090">layer</text>

  <text font-family="Georgia, serif" font-size="17" font-weight="bold"
        x="360" y="34" text-anchor="middle" fill="#D8DDD0">Business logic</text>
  <text font-family="Georgia, serif" font-size="13"
        x="360" y="54" text-anchor="middle" fill="#9AA090">layer</text>

  <text font-family="Georgia, serif" font-size="17" font-weight="bold"
        x="580" y="34" text-anchor="middle" fill="#D8DDD0">Presentation</text>
  <text font-family="Georgia, serif" font-size="13"
        x="580" y="54" text-anchor="middle" fill="#9AA090">layer</text>

  <!-- ── DATA LAYER ── -->

  <!-- Scheduled EOD Timer: rounded rect x=18 y=88 w=192 h=54 -->
  <rect x="18" y="88" width="192" height="54" rx="12" fill="#DCF0C0" stroke="#6A9A3A" stroke-width="1.2"/>
  <text font-family="Georgia, serif" font-size="13" font-weight="bold"
        x="114" y="108" text-anchor="middle" fill="#1A4A10">Scheduled EOD timer</text>
  <text font-family="Georgia, serif" font-size="11"
        x="114" y="128" text-anchor="middle" fill="#3A6A28">daily financial close</text>

  <!-- Green stem from timer bottom (114,142) down, splits to ERP and Economic -->
  <!-- Stem down to y=170 -->
  <line x1="114" y1="142" x2="114" y2="172" stroke="#4A7A3A" stroke-width="1.5"/>
  <!-- Horizontal rail at y=172: left branch x=74, right branch x=154 -->
  <line x1="74"  y1="172" x2="154" y2="172" stroke="#4A7A3A" stroke-width="0.8"/>
  <!-- Left branch down to ERP top (74, 200) -->
  <line x1="74"  y1="172" x2="74"  y2="200" stroke="#4A7A3A" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- Right branch down to Economic top (154, 370) -->
  <line x1="154" y1="172" x2="154" y2="370" stroke="#4A7A3A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ERP Financial Ledger cylinder: cx=74, top y=200 -->
  <rect x="14"  y="212" width="120" height="44" fill="#DCF0C0"/>
  <ellipse cx="74" cy="212" rx="60" ry="14" fill="#ECF8D0" stroke="#6A9A3A" stroke-width="1"/>
  <ellipse cx="74" cy="256" rx="60" ry="14" fill="#DCF0C0" stroke="#6A9A3A" stroke-width="1"/>
  <text font-family="Georgia, serif" font-size="13" font-weight="bold"
        x="74" y="229" text-anchor="middle" fill="#1A4A10">ERP financial</text>
  <text font-family="Georgia, serif" font-size="11"
        x="74" y="247" text-anchor="middle" fill="#3A6A28">ledger</text>

  <!-- External Economic Indicators cylinder: cx=154, top y=370 -->
  <rect x="94"  y="382" width="120" height="44" fill="#DCF0C0"/>
  <ellipse cx="154" cy="382" rx="60" ry="14" fill="#ECF8D0" stroke="#6A9A3A" stroke-width="1"/>
  <ellipse cx="154" cy="426" rx="60" ry="14" fill="#DCF0C0" stroke="#6A9A3A" stroke-width="1"/>
  <text font-family="Georgia, serif" font-size="13" font-weight="bold"
        x="154" y="397" text-anchor="middle" fill="#1A4A10">External economic</text>
  <text font-family="Georgia, serif" font-size="11"
        x="154" y="415" text-anchor="middle" fill="#3A6A28">indicators</text>

  <!-- ── BUSINESS LOGIC LAYER ── -->

  <!-- Hybrid LSTM Forecasting Engine: x=252 y=196 w=216 h=76 -->
  <rect x="252" y="196" width="216" height="76" rx="10" fill="#D8D0F0" stroke="none"/>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="360" y="222" text-anchor="middle" fill="#1A1A60">Hybrid LSTM</text>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="360" y="240" text-anchor="middle" fill="#1A1A60">forecasting engine</text>
  <text font-family="Georgia, serif" font-size="11"
        x="360" y="260" text-anchor="middle" fill="#4A4A90">90-day projection</text>

  <!-- SHAP Calculation Engine: x=252 y=368 w=216 h=76 -->
  <rect x="252" y="368" width="216" height="76" rx="10" fill="#D8D0F0" stroke="none"/>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="360" y="394" text-anchor="middle" fill="#1A1A60">SHAP calculation</text>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="360" y="412" text-anchor="middle" fill="#1A1A60">engine</text>
  <text font-family="Georgia, serif" font-size="11"
        x="360" y="430" text-anchor="middle" fill="#4A4A90">variable importance scores</text>

  <!-- Purple arrow: LSTM bottom (360,272) -> SHAP top (360,368) -->
  <line x1="360" y1="272" x2="360" y2="368"
        stroke="#5050A0" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- ERP -> LSTM: (134,234) -> right to LSTM left (252,234) -->
  <line x1="134" y1="234" x2="252" y2="234"
        stroke="#9AA090" stroke-width="1.2" marker-end="url(#arr-gray)"/>

  <!-- Economic -> SHAP: (214,404) -> right to SHAP left (252,404) -->
  <line x1="214" y1="404" x2="252" y2="404"
        stroke="#9AA090" stroke-width="1.2" marker-end="url(#arr-gray)"/>

  <!-- ── PRESENTATION LAYER ── -->

  <!-- Interactive CFO XAI Dashboard: x=492 y=242 w=176 h=160 -->
  <rect x="492" y="242" width="176" height="160" rx="10" fill="#D0E8F8" stroke="none"/>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="580" y="292" text-anchor="middle" fill="#0A1A5A">Interactive CFO</text>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="580" y="312" text-anchor="middle" fill="#0A1A5A">XAI dashboard</text>
  <text font-family="Georgia, serif" font-size="12"
        x="580" y="342" text-anchor="middle" fill="#2A4A7A">liquidity forecast</text>
  <text font-family="Georgia, serif" font-size="12"
        x="580" y="360" text-anchor="middle" fill="#2A4A7A">+ SHAP visuals</text>

  <!-- LSTM -> Dashboard: (468,234) -> right elbow -> dashboard left at y=282 -->
  <polyline points="468,234 480,234 480,282 492,282"
            fill="none" stroke="#9AA090" stroke-width="1.2" marker-end="url(#arr-gray)"/>

  <!-- SHAP -> Dashboard: (468,404) -> right elbow -> dashboard left at y=362 -->
  <polyline points="468,404 480,404 480,362 492,362"
            fill="none" stroke="#9AA090" stroke-width="1.2" marker-end="url(#arr-gray)"/>

</svg>
