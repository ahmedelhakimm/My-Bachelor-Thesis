<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 920">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th  { font-size: 13px; font-weight: 600; }
      .ts  { font-size: 11px; font-weight: 400; }
      /* Layer fill + stroke classes */
      .l5  { fill: #FEFAE8; stroke: #C9A71A; }
      .l4  { fill: #FAECE7; stroke: #D85A30; }
      .l3  { fill: #EEEDFE; stroke: #534AB7; }
      .l2  { fill: #E6F1FB; stroke: #185FA5; }
      .l1  { fill: #E1F5EE; stroke: #0F6E56; }
      .node-l5 { fill: #FFF8D0; stroke: #C9A71A; }
      .node-l4 { fill: #ffffff; stroke: #D85A30; }
      .node-l3 { fill: #EEEDFE; stroke: #534AB7; }
      .node-l2 { fill: #E6F1FB; stroke: #185FA5; }
      .node-l1 { fill: #ffffff; stroke: #888780; }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 5 — Presentation Layer (User Interface)          -->
  <!-- y=32  h=148  bottom=180                                -->
