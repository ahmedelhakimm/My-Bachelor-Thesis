<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
  <title>AP Swimlane Dark Theme</title>
  <defs>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9AA090" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5A8A5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8B3A2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7090A0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="820" fill="#4A4E46"/>

  <!-- Swimlane fills -->
  <rect x="0"   y="0" width="200" height="820" fill="#52564E"/>
  <rect x="200" y="0" width="290" height="820" fill="#4E524A"/>
  <rect x="490" y="0" width="190" height="820" fill="#4A4E46"/>

  <!-- Dividers -->
  <line x1="200" y1="0"  x2="200" y2="820" stroke="#3A3E36" stroke-width="1.5"/>
  <line x1="490" y1="0"  x2="490" y2="820" stroke="#3A3E36" stroke-width="1.5"/>
  <line x1="0"   y1="68" x2="680" y2="68"  stroke="#3A3E36" stroke-width="1"/>

  <!-- Headers -->
  <text font-family="Georgia, serif" font-size="17" font-weight="bold"
        x="100" y="34" text-anchor="middle" fill="#D8DDD0">Presentation</text>
  <text font-family="Georgia, serif" font-size="13"
        x="100" y="54" text-anchor="middle" fill="#9AA090">layer</text>

  <text font-family="Georgia, serif" font-size="17" font-weight="bold"
        x="345" y="34" text-anchor="middle" fill="#D8DDD0">Business logic</text>
  <text font-family="Georgia, serif" font-size="13"
        x="345" y="54" text-anchor="middle" fill="#9AA090">layer</text>

  <text font-family="Georgia, serif" font-size="17" font-weight="bold"
        x="585" y="34" text-anchor="middle" fill="#D8DDD0">Data</text>
  <text font-family="Georgia, serif" font-size="13"
        x="585" y="54" text-anchor="middle" fill="#9AA090">layer</text>

  <!-- ── Presentation Layer ── -->

  <!-- External Vendor stick figure -->
  <circle cx="100" cy="118" r="18" fill="#B0B8C8"/>
  <line x1="100" y1="136" x2="100" y2="178" stroke="#6070A8" stroke-width="2"/>
  <line x1="100" y1="150" x2="76"  y2="168" stroke="#6070A8" stroke-width="2"/>
  <line x1="100" y1="150" x2="124" y2="168" stroke="#6070A8" stroke-width="2"/>
  <line x1="100" y1="178" x2="82"  y2="202" stroke="#6070A8" stroke-width="2"/>
  <line x1="100" y1="178" x2="118" y2="202" stroke="#6070A8" stroke-width="2"/>
  <text font-family="Georgia, serif" font-size="14"
        x="100" y="224" text-anchor="middle" fill="#C8CEC0">External vendor</text>

  <!-- Vendor -> Email Listener arrow (elbow) -->
  <polyline points="124,158 168,158 168,130 218,130"
            fill="none" stroke="#9AA090" stroke-width="1.2"
            marker-end="url(#arr-blue)"/>

  <!-- Human Exception Dashboard -->
  <rect x="12" y="620" width="178" height="72" rx="10"
        fill="#3A1A14" stroke="#8B3A2A" stroke-width="1.5"/>
  <text font-family="Georgia, serif" font-size="13" font-weight="bold"
        x="101" y="648" text-anchor="middle" fill="#D08070">Human exception</text>
  <text font-family="Georgia, serif" font-size="13" font-weight="bold"
        x="101" y="666" text-anchor="middle" fill="#D08070">dashboard</text>
  <text font-family="Georgia, serif" font-size="12"
        x="101" y="682" text-anchor="middle" fill="#A06050">manual review</text>

  <!-- ── Business Logic Layer ── -->

  <!-- Email Listener: y=108 h=52 -->
  <rect x="218" y="108" width="254" height="52" rx="10" fill="#C8EDE0"/>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="345" y="130" text-anchor="middle" fill="#1A3A2A">Email listener</text>
  <text font-family="Georgia, serif" font-size="12"
        x="345" y="148" text-anchor="middle" fill="#3A5A4A">ingestion</text>

  <!-- Email Listener -> NLP -->
  <line x1="345" y1="160" x2="345" y2="208"
        stroke="#9AA090" stroke-width="1.2" marker-end="url(#arr-gray)"/>

  <!-- NLP Extraction Tool: y=208 h=52 -->
  <rect x="218" y="208" width="254" height="52" rx="10" fill="#C8EDE0"/>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="345" y="230" text-anchor="middle" fill="#1A3A2A">NLP extraction tool</text>
  <text font-family="Georgia, serif" font-size="12"
        x="345" y="248" text-anchor="middle" fill="#3A5A4A">field recognition</text>

  <!-- NLP -> JSON -->
  <line x1="345" y1="260" x2="345" y2="308"
        stroke="#9AA090" stroke-width="1.2" marker-end="url(#arr-gray)"/>

  <!-- JSON Semantic Engine: y=308 h=52 -->
  <rect x="218" y="308" width="254" height="52" rx="10" fill="#C8EDE0"/>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="345" y="330" text-anchor="middle" fill="#1A3A2A">JSON semantic engine</text>
  <text font-family="Georgia, serif" font-size="12"
        x="345" y="348" text-anchor="middle" fill="#3A5A4A">structured mapping</text>

  <!-- JSON -> Diamond -->
  <line x1="345" y1="360" x2="345" y2="392"
        stroke="#9AA090" stroke-width="1.2" marker-end="url(#arr-gray)"/>

  <!-- Confidence Diamond: centre=(345,460) -->
  <polygon points="345,392 445,460 345,528 245,460" fill="#FAE8C8"/>
  <text font-family="Georgia, serif" font-size="12"
        x="345" y="448" text-anchor="middle" fill="#8B6020">Confidence threshold</text>
  <text font-family="Georgia, serif" font-size="14" font-weight="bold"
        x="345" y="470" text-anchor="middle" fill="#8B6020">&#x2265; 90%?</text>

  <!-- YES arrow: diamond right (445,460) -> Salesforce left -->
  <text font-family="Georgia, serif" font-size="12" x="452" y="452" fill="#5A8A5A">Yes</text>
  <line x1="445" y1="460" x2="510" y2="460"
        stroke="#5A8A5A" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <!-- NO arrow: diamond left (245,460) -> left -> down -> Exception Dashboard -->
  <text font-family="Georgia, serif" font-size="12"
        x="222" y="472" text-anchor="end" fill="#8B3A2A">No</text>
  <polyline points="245,460 101,460 101,620"
            fill="none" stroke="#8B3A2A" stroke-width="1.2"
            marker-end="url(#arr-red)"/>

  <!-- ── Data Layer ── -->

  <!-- Salesforce ERP Ledger cylinder -->
  <rect x="525" y="444" width="120" height="44" fill="#DCF0CC"/>
  <ellipse cx="585" cy="444" rx="60" ry="18" fill="#E8F8D8" stroke="#6A9A5A" stroke-width="1"/>
  <ellipse cx="585" cy="488" rx="60" ry="18" fill="#DCF0CC"  stroke="#6A9A5A" stroke-width="1"/>
  <text font-family="Georgia, serif" font-size="13" font-weight="bold"
        x="585" y="462" text-anchor="middle" fill="#2A4A2A">Salesforce ERP</text>
  <text font-family="Georgia, serif" font-size="12"
        x="585" y="478" text-anchor="middle" fill="#4A6A4A">ledger</text>
  <!-- strikethrough on ledger -->
  <line x1="554" y1="476" x2="616" y2="476" stroke="#4A6A4A" stroke-width="1"/>

</svg>
